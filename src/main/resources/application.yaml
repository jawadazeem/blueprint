# Configuration applied to all profiles (default)
spring:
  application:
    name: telecom-billing-processor
  cloud:
    aws:
      s3:
        # Defaults to localstack for Docker, but can be overridden
        endpoint: ${AWS_S3_ENDPOINT:http://localhost:4566}
        path-style-access-enabled: true
      region:
        static: ${AWS_REGION:us-east-1}
      credentials:
        access-key: ${AWS_ACCESS_KEY:test}
        secret-key: ${AWS_SECRET_KEY:test}
server:
  port: 8080
logging:
  file:
    name: app.log
# Business-specific configuration
alarm:
  department:
    monthlyLimit: 7500
  individual:
    low: 250
    medium: 370
    high: 500
  account:
    low: 45000
    high: 60000
billing-reader:
  has-header: true
  batch-size: 100

---
# Configuration for the 'dev' profile only
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:h2:mem:devdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
---
# Configuration for the 'test' profile only
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:postgresql://localhost:5432/billingdb
    username: billing_app
    password: 875869
  jpa:
    hibernate:
      ddl-auto: create-drop

---
# Configuration for the 'prod' profile only
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${PROD_DB_URL:jdbc:postgresql://localhost:5432/billingdb}
    username: billing_app
    password: 875869
  jpa:
    hibernate:
      ddl-auto: update