<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login | Blueprint</title>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="icon" href="/assets/icons/favicon.png" />
    <link rel="stylesheet" href="/css/main.css" />
    <link rel="stylesheet" href="/css/login.css" />
</head>

<body class="login-page">
<div class="login-shell">
    <div class="brand-panel">
        <div class="brand-title">Blueprint</div>
        <div class="brand-sub">
            Telecom billing analytics and insights dashboard.
        </div>
    </div>

    <div class="login-panel">
        <div class="login-header">
            <h2>Welcome back</h2>
            <p>Sign in or continue as a guest to explore the demo.</p>
        </div>

        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label" for="username">Username</label>
                <input type="text" id="username" class="form-control" placeholder="Enter username" />
            </div>

            <div class="mb-3">
                <label class="form-label" for="password">Password</label>
                <input type="password" id="password" class="form-control" placeholder="Enter password" />
            </div>

            <div class="helper-row">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="rememberMe">
                    <label class="form-check-label" for="rememberMe">Remember me</label>
                </div>

                <a href="#" class="helper-link">Forgot password?</a>
            </div>

            <button type="submit" class="btn btn-primary login-btn">
                Sign In
            </button>
        </form>

        <button id="guestBtn" class="guest-btn" type="button">
            Continue as Guest
        </button>

        <div id="statusMessage" class="status-message"></div>

        <div class="footer">
            Blueprint Billing Portal • © 2026 Jawad Azeem
        </div>
    </div>
</div>

<script src="/js/main.js"></script>
<script src="/js/login.js"></script>
</body>
</html>
