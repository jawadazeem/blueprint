<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login | Blueprint</title>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>

    <link rel="icon" href="./favicon.png" />

    <style>
        :root{
            --bg:#f5f6fa;
            --card:#ffffff;
            --muted:#6c757d;
            --accent:#0d6efd;
            --border:#e9ecef;
        }

        *{ box-sizing:border-box; }

        body{
            margin:0;
            min-height:100vh;
            font-family:"Montserrat", sans-serif;
            background:
                    radial-gradient(circle at top left, rgba(13,110,253,0.10), transparent 25%),
                    linear-gradient(180deg, #f7f8fb 0%, var(--bg) 100%);
            display:flex;
            align-items:center;
            justify-content:center;
            padding:24px;
            color:#222;
        }

        .login-shell{
            width:100%;
            max-width:1100px;
            display:grid;
            grid-template-columns: 1fr 480px;
            background:var(--card);
            border-radius:20px;
            overflow:hidden;
            box-shadow:0 20px 60px rgba(10,20,50,0.08);
            border:1px solid #f0f0f0;
        }

        .brand-panel{
            padding:56px;
            background: linear-gradient(135deg, rgba(13,110,253,0.08), rgba(13,110,253,0.02));
            display:flex;
            flex-direction:column;
            justify-content:center;
        }

        .brand-title{
            font-size:58px;
            font-weight:800;
            letter-spacing:-2px;
            margin-bottom:16px;
            line-height:1;
        }

        .brand-sub{
            color:var(--muted);
            font-size:17px;
            line-height:1.7;
            max-width:520px;
        }

        .login-panel{
            padding:56px 44px;
            display:flex;
            flex-direction:column;
            justify-content:center;
        }

        .login-header h2{
            font-size:34px;
            font-weight:800;
            margin-bottom:8px;
        }

        .login-header p{
            color:var(--muted);
            margin-bottom:34px;
        }

        .form-label{
            font-weight:600;
            margin-bottom:8px;
            font-size:14px;
        }

        .form-control{
            border-radius:12px;
            padding:14px 16px;
            border:1px solid var(--border);
        }

        .form-control:focus{
            border-color:var(--accent);
            box-shadow:0 0 0 0.15rem rgba(13,110,253,0.15);
        }

        .login-btn{
            width:100%;
            border:none;
            border-radius:12px;
            padding:14px;
            font-weight:700;
            margin-top:8px;
        }

        /* BIG GUEST BUTTON */
        .guest-btn{
            width:100%;
            border-radius:12px;
            padding:16px;
            font-weight:800;
            font-size:16px;
            margin-top:14px;
            background:#111;
            color:#fff;
            border:none;
            transition:0.2s ease;
        }

        .guest-btn:hover{
            transform:translateY(-2px);
            opacity:0.9;
        }

        .helper-row{
            display:flex;
            justify-content:space-between;
            margin-top:14px;
            margin-bottom:26px;
        }

        .helper-link{
            font-size:13px;
            color:var(--accent);
            font-weight:600;
            text-decoration:none;
        }

        .helper-link:hover{ text-decoration:underline; }

        .status-message{
            margin-top:18px;
            display:none;
            padding:14px;
            border-radius:12px;
            font-size:14px;
            font-weight:600;
        }

        .status-message.error{
            background:#fff1f2;
            border:1px solid #fecdd3;
            color:#be123c;
        }

        .status-message.success{
            background:#ecfdf3;
            border:1px solid #bbf7d0;
            color:#15803d;
        }

        .footer{
            margin-top:34px;
            text-align:center;
            color:var(--muted);
            font-size:13px;
        }

        @media(max-width:960px){
            .login-shell{ grid-template-columns:1fr; }
            .brand-panel{ display:none; }
        }
    </style>
</head>

<body>

<div class="login-shell">

    <!-- LEFT -->
    <div class="brand-panel">
        <div class="brand-title">Blueprint</div>
        <div class="brand-sub">
            Telecom billing analytics and insights dashboard.
        </div>
    </div>

    <!-- RIGHT -->
    <div class="login-panel">

        <div class="login-header">
            <h2>Welcome back</h2>
            <p>Sign in or continue as a guest to explore the demo.</p>
        </div>

        <form id="loginForm">

            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" id="username" class="form-control" placeholder="Enter username" />
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" id="password" class="form-control" placeholder="Enter password" />
            </div>

            <div class="helper-row">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="rememberMe">
                    <label class="form-check-label">Remember me</label>
                </div>

                <a href="#" class="helper-link">Forgot password?</a>
            </div>

            <button type="submit" class="btn btn-primary login-btn">
                Sign In
            </button>

        </form>

        <!-- BIG GUEST BUTTON -->
        <button id="guestBtn" class="guest-btn">
            Continue as Guest
        </button>

        <div id="statusMessage" class="status-message"></div>

        <div class="footer">
            Blueprint Billing Portal • © 2026 Jawad Azeem
        </div>

    </div>

</div>

<script>
    const form = document.getElementById("loginForm");
    const guestBtn = document.getElementById("guestBtn");
    const statusMessage = document.getElementById("statusMessage");

    function showMessage(type, text){
        statusMessage.style.display = "block";
        statusMessage.className = "status-message " + type;
        statusMessage.textContent = text;
    }

    form.addEventListener("submit", (e) => {
        e.preventDefault();

        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value.trim();

        if (!username || !password) {
            showMessage("error", "Enter both username and password.");
            return;
        }

        console.log("Login:", { username, password });

        showMessage("success", "Login flow ready (demo mode).");
    });

    guestBtn.addEventListener("click", () => {
        console.log("Guest access granted");

        showMessage("success", "Entering as guest...");

        // Replace this with actual routing if needed:
        // window.location.href = "/dashboard";
    });
</script>

</body>
</html>
