<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>404 | Blueprint</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&display=swap" rel="stylesheet">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>

    <link rel="icon" href="../favicon.png" />

    <style>
        :root{
            --bg:#f5f6fa;
            --card:#fff;
            --muted:#6c757d;
            --accent:#0d6efd;
        }

        *{
            box-sizing:border-box;
        }

        body{
            margin:0;
            padding:0;
            min-height:100vh;

            font-family:"Montserrat", sans-serif;
            color:#222;

            background:
                radial-gradient(circle at top left, rgba(13,110,253,0.10), transparent 32%),
                radial-gradient(circle at bottom right, rgba(13,110,253,0.06), transparent 28%),
                linear-gradient(180deg, #f7f8fb 0%, var(--bg) 100%);
        }

        .error-hero{
            min-height:92vh;

            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;

            text-align:center;

            padding:64px 28px;
        }

        .hero-content{
            max-width:760px;
        }

        .error-code{
            font-size:140px;
            line-height:1;
            font-weight:800;
            letter-spacing:-8px;

            color:var(--accent);

            opacity:.92;

            margin-bottom:18px;

            text-shadow:
                0 10px 30px rgba(13,110,253,0.12);
        }

        .error-hero h1{
            font-size:46px;
            line-height:1.15;

            font-weight:700;
            letter-spacing:-1.5px;

            margin-bottom:22px;
        }

        .hero-sub{
            font-size:20px;
            line-height:1.8;

            color:var(--muted);

            margin:0 auto 34px auto;

            max-width:680px;
        }

        .legacy-link{
            margin-top:6px;
        }

        .legacy-link a{
            text-decoration:none;

            font-size:12px;
            letter-spacing:.8px;

            color:#222;

            opacity:.42;

            transition:
                opacity .2s ease,
                transform .2s ease;
        }

        .legacy-link a:hover{
            opacity:.9;
            transform:translateY(-1px);
        }

        .hero-actions{
            margin-top:42px;
        }

        .return-text{
            color:var(--muted);
            font-size:14px;

            margin-bottom:12px;
        }

        .btn-primary-lg{
            padding:14px 22px;
            font-size:16px;
            font-weight:600;

            border-radius:12px;

            box-shadow:
                0 10px 24px rgba(13,110,253,0.16);
        }

        footer.app-footer{
            border-top:1px solid rgba(0,0,0,0.06);

            padding-top:18px;
            padding-bottom:20px;

            background:transparent;
        }

        .footer-title{
            font-weight:600;
        }

        .footer-separator{
            margin:0 8px;
            opacity:.5;
        }

        .footer-sub{
            color:var(--muted);
        }

        @media (max-width:768px){

            .error-code{
                font-size:96px;
                letter-spacing:-4px;
            }

            .error-hero h1{
                font-size:34px;
            }

            .hero-sub{
                font-size:17px;
                line-height:1.7;
            }

            .btn-primary-lg{
                width:100%;
            }
        }
    </style>
</head>

<body>

<div class="error-hero">

    <div class="hero-content">

        <div class="error-code">
            404
        </div>

        <h1>
            Uh oh. We couldn’t find what you’re looking for.
        </h1>

        <p class="hero-sub">
            Some things get archived.
            Some get migrated.
            Some become enterprise strategy.
        </p>

        <div class="legacy-link">
            <a href="/">
                Blueprint
            </a>
        </div>

        <div class="hero-actions">

            <div class="return-text">
                Ready to resume normal operations?
            </div>

            <button
                    class="btn btn-primary btn-primary-lg"
                    onclick="window.location.href='/'">
                Go Back Home
            </button>

        </div>

    </div>

</div>

<footer class="app-footer">
    <div class="container text-center py-3">

        <span class="footer-title">
            Blueprint Billing Portal
        </span>

        <span class="footer-separator">
            •
        </span>

        <span class="footer-sub">
            © 2026 Jawad Azeem
        </span>

    </div>
</footer>

</body>
</html>
