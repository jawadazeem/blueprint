name: Deploy Billing App

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests # Get that .jar ready

      - name: Login to GHCR (GitHub Container Registry)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # This tags the image with 'latest' and the specific git commit hash
          tags: |
            ghcr.io/${{ github.repository }}/billing-app:latest
            ghcr.io/${{ github.repository }}/billing-app:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH to Pavilion and Pull
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PAVILION_IP }}
          username: ${{ secrets.PAVILION_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/billing-project
            # Login to registry on the junker
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            # Pull the new image and restart the service
            docker compose pull app
            docker compose up -d app
            docker image prune -f